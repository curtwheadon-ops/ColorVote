<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Status">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Status</title>
 <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
     width: 100%; height: 100%;
     overflow: hidden;
     touch-action: none;
     -webkit-user-select: none;
     user-select: none;
  }

  body {
     background: #9E9E9E;
     transition: background 0.25s ease;
     display: flex;
     flex-direction: column;
     align-items: center;
     justify-content: center;
     font-family: -apple-system, sans-serif;
  }

  #status-label {
     font-size: clamp(28px, 10vw, 52px);
     font-weight: 700;
     color: rgba(255,255,255,0.85);
     letter-spacing: 0.06em;
     text-transform: uppercase;
     text-shadow: none;
     pointer-events: none;
     transition: opacity 0.2s, color 0.25s ease;
  }

  #hint {
     position: absolute;
     bottom: 40px;
     font-size: 13px;
     color: rgba(255,255,255,0.5);
     text-align: center;
     line-height: 1.6;
     pointer-events: none;
     transition: opacity 0.4s;
  }

  #swipe-indicator {
     position: absolute;
     top: 50%;
     left: 50%;
     transform: translate(-50%, -50%);
     width: 80px;
     height: 80px;
     border-radius: 50%;
     background: rgba(255,255,255,0.15);
     opacity: 0;
     transition: opacity 0.15s;
     pointer-events: none;
  }

  body.hide-hint #hint { opacity: 0; }
  </style>
 </head>
 <body>

  <div id="swipe-indicator"></div>
  <div id="status-label">Ready</div>
  <div id="hint">Swipe up &middot; down to change<br>Swipe left &middot; right to reset</div>

  <script>
   const STATES = ['grey', 'green', 'yellow', 'red'];
   const COLORS = {
      grey:   { bg: '#9E9E9E', label: 'Ready',  text: 'rgba(255,255,255,0.85)' },
      green:  { bg: '#388E3C', label: 'Green',  text: 'rgba(40,100,44,0.6)'    },
      yellow: { bg: '#FF6D00', label: 'Orange', text: 'rgba(140,55,0,0.55)'    },
      red:    { bg: '#FF1744', label: 'Red',    text: 'rgba(140,10,30,0.55)'   }
   };

   let currentIndex = 0;

   const body = document.body;
   const label = document.getElementById('status-label');
   const hint = document.getElementById('hint');

   function applyState(idx) {
      currentIndex = Math.max(0, Math.min(3, idx));
      const key = STATES[currentIndex];
      body.style.background = COLORS[key].bg;
      label.style.color = COLORS[key].text;
      label.textContent = COLORS[key].label;
      if (currentIndex !== 0) body.classList.add('hide-hint');
      else body.classList.remove('hide-hint');
   }

   let startX = 0, startY = 0;
   const MIN_SWIPE = 40;

   body.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
   }, { passive: true });

   body.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      const absDx = Math.abs(dx), absDy = Math.abs(dy);

      if (absDx < MIN_SWIPE && absDy < MIN_SWIPE) return;

      if (absDx > absDy) {
           applyState(0);
      } else {
           applyState(currentIndex + (dy < 0 ? 1 : -1));
      }
   }, { passive: true });

   applyState(0);
  </script>
 </body>
</html>
